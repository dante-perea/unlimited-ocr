# Fly.io configuration for the Unlimited-OCR backend.
# Deploy with:  cd backend && flyctl deploy
app = "unlimited-ocr-backend"
primary_region = "iad"

[build]

# MOCK/offline mode: real NCBI search + PDF download, canned OCR output.
# No torch/weights/GPU required. Unset OCR_MOCK on a CUDA host for real OCR.
[env]
  OCR_MOCK = "1"
  ENVIRONMENT = "production"
  DATA_DIR = "/app/data"
  # Allow the Vercel frontend (+ local dev) to call this API.
  CORS_ORIGINS = "https://unlimited-ocr-perea-ai.vercel.app,https://unlimited-ocr.vercel.app,https://unlimited-ocr-git-main-perea-ai.vercel.app,http://localhost:3000"

# Persistent volume for the PMC PDF cache (survives machine restarts).
[mounts]
  source = "ocr_data"
  destination = "/app/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health"
